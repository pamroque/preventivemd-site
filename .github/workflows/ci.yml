name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint step temporarily removed — Next.js 16 removed the `next lint` command,
      # and we haven't migrated to ESLint flat config yet. Re-add once eslint.config.mjs is set up.
      # - name: Lint
      #   run: npm run lint

      - name: Build
        run: npm run build
